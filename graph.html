<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Graph Visualizer</title>
    <link rel="icon" type="image/png" href="icon.png">

    <link rel="stylesheet" href="graph.css">

</head>

<body>

    <!-- BACK -->

    <a href="index.html"
       class="back-btn">

       ← Back

    </a>

    <!-- TITLE -->

    <h1>Graph Visualizer</h1>

    <p class="subtitle">
        Graphs consist of vertices(nodes) connected using edges.
    </p>

    <!-- GRAPH AREA -->

    <div class="graph-container">

        <svg id="graph-lines"></svg>

        <div id="graph"></div>

    </div>

    <!-- OPERATIONS -->

    <div class="operations">

        <input type="number"
               id="node-value"
               placeholder="Node value">

        <input type="number"
               id="from-node"
               placeholder="From">

        <input type="number"
               id="to-node"
               placeholder="To">

        <button id="add-node-btn">Add Node</button>

        <button id="add-edge-btn">Add Edge</button>

        <button id="bfs-btn">BFS</button>

        <button id="dfs-btn">DFS</button>

        <button id="info-btn"
                class="info-btn">

            ⓘ

        </button>

    </div>

    <!-- MESSAGE -->

    <p id="message"></p>

    <!-- INFO -->

    <div class="complexity-panel hidden"
         id="complexity-panel">

        <h2>Graph Information</h2>

        <div class="complexity-card">
            <span>Add Node</span>
            <span>O(1)</span>
        </div>

        <div class="complexity-card">
            <span>Add Edge</span>
            <span>O(1)</span>
        </div>

        <div class="complexity-card">
            <span>BFS Traversal</span>
            <span>O(V + E)</span>
        </div>

        <div class="complexity-card">
            <span>DFS Traversal</span>
            <span>O(V + E)</span>
        </div>

    </div>

    <script src="graph.js"></script>

</body>

</html>
