<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Queue Visualizer</title>
    <link rel="icon" type="image/png" href="icon.png">

    <link rel="stylesheet" href="queue.css">

</head>

<body>

    <!-- BACK BUTTON -->

    <a href="index.html" class="back-btn">← Back</a>

    <!-- TITLE -->

    <h1>Queue Visualizer</h1>

    <p class="subtitle">
        Queue follows First In First Out (FIFO)
    </p>

    <!-- QUEUE -->

    <div class="queue-wrapper">

        <div class="pointer-row">

            <span class="front-label">
                FRONT
            </span>

            <span class="rear-label">
                REAR
            </span>

        </div>

        <div class="queue-container"
             id="queue">

        </div>

    </div>

    <!-- OPERATIONS -->

    <div class="operations">

        <input type="number"
               id="queue-value"
               placeholder="Enter value">

        <button id="enqueue-btn">Enqueue</button>

        <button id="dequeue-btn">Dequeue</button>

        <button id="peek-btn">Peek</button>

        <button id="empty-btn">isEmpty</button>

        <button id="info-btn"
                class="info-btn">

            ⓘ

        </button>

    </div>

    <!-- MESSAGE -->

    <p id="message"></p>

    <!-- COMPLEXITY PANEL -->

    <div class="complexity-panel hidden"
         id="complexity-panel">

        <h2>Queue Information</h2>

        <div class="complexity-card">
            <span>Enqueue</span>
            <span>O(1)</span>
        </div>

        <div class="complexity-card">
            <span>Dequeue</span>
            <span>O(1)</span>
        </div>

        <div class="complexity-card">
            <span>Peek</span>
            <span>O(1)</span>
        </div>

        <div class="complexity-card">
            <span>isEmpty</span>
            <span>O(1)</span>
        </div>

    </div>

    <!-- JS -->

    <script src="queue.js"></script>

</body>

</html>
